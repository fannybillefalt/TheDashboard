<!doctype html>
<html lang="sv">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Golos+Text:wght@400..900&display=swap"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Rubik:wght@300..900&display=swap"
      rel="stylesheet"
    />
    <script src="./weatherAPI.js" defer></script>
    <script src="./timestamp.js" defer></script>
    <script src="./unsplashAPI.js" defer></script>
    <script src="./dashboard.js" defer></script>
    <script src="./quizAPI.js" defer></script>

    <title>The Dashboard</title>
  </head>
  <body>
    <header class="timestamp" id="timestamp"><time datetime=""></time></header>
    <main>
      <section class="mainheading">
        <h1 id="mainheading" contenteditable="true">Fannys Dashboard</h1>
      </section>

      <section class="cards">
        <article class="card">
          <h4 class="card-heading">Snabblänkar</h4>
          <div id="links"></div>
          <button class="addLink-btn" id="addlink"><img src="./pictures/add-button.png">Lägg till länk</button>
        </article>
        <article class="card">
          <h4 class="card-heading">Dagens väder</h4>
          <div class="dailyweather" id="dailyweather">
          </div>
        </article>
        <article class="card">
          <h4 class="card-heading">Quiz</h4>
          <div id="quiz"></div>
        </article>
        <article class="card">
          <h4 class="card-heading">Anteckningar</h4>
          <textarea name="notes"></textarea>
        </article>
      </section>
    </main>
    <footer>
      <button class="randombtn" id="randombackground">
      <img src="./pictures/refresh.png">Slumpa ny bakgrund</button>
    </footer>
  </body>
</html>
